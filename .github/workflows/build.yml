name: Build & Release

on:
  # Trigger manually from GitHub UI
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 5.1.0)'
        required: false
        default: ''

  # Trigger automatically when you push a version tag: git tag v5.1.0 && git push --tags
  push:
    tags:
      - 'v*'

jobs:
  # ── Windows (.exe installer) ────────────────────────────────────────────────
  build-windows:
    name: Windows Installer
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Windows icon
        run: npx --yes electron-icon-builder --input=electron/icon.svg --output=electron/icons --flatten
        shell: bash
        continue-on-error: true

      - name: Create .env file
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
        shell: bash

      - name: Build React app (Electron mode)
        run: npx cross-env ELECTRON=1 npx vite build

      - name: Build Windows installer
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist-electron/*.exe
          retention-days: 30

  # ── macOS (.dmg) ────────────────────────────────────────────────────────────
  build-mac:
    name: macOS Installer
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate macOS icon
        run: |
          brew install librsvg
          rsvg-convert -h 512 -w 512 electron/icon.svg > electron/icon.png
        continue-on-error: true

      - name: Create .env file
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env

      - name: Build React app (Electron mode)
        run: npx cross-env ELECTRON=1 npx vite build

      - name: Build macOS installer
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uncomment and add secrets below if you have an Apple Developer account:
          # CSC_LINK: ${{ secrets.MAC_CERT_P12_BASE64 }}
          # CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: dist-electron/*.dmg
          retention-days: 30

  # ── Linux (.AppImage + .deb) ────────────────────────────────────────────────
  build-linux:
    name: Linux Installer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg librsvg2-bin

      - name: Generate Linux icon
        run: rsvg-convert -h 512 -w 512 electron/icon.svg > electron/icon.png

      - name: Create .env file
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env

      - name: Build React app (Electron mode)
        run: npx cross-env ELECTRON=1 npx vite build

      - name: Build Linux installer
        run: npx electron-builder --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb
          retention-days: 30

  # ── Create GitHub Release (only on version tags) ────────────────────────────
  release:
    name: Publish Release
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: NTCC Church App ${{ github.ref_name }}
          body: |
            ## NTCC Church App ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows | `NTCC Church App Setup *.exe` |
            | macOS | `NTCC Church App-*.dmg` |
            | Linux | `NTCC Church App-*.AppImage` or `.deb` |

            ### Install
            - **Windows:** Run the `.exe` installer
            - **Mac:** Open the `.dmg`, drag app to Applications
            - **Linux:** Make the `.AppImage` executable and run it, or install the `.deb`
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
